name: aur-shatv-bin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-shatv-bin:
    runs-on: ubuntu-24.04

    env:
      ARCH_CONTAINER_IMAGE: archlinux:base-devel
      ARCH_BUILD_DIR: build-arch-asr
      ARCH_PACKAGE_ROOT: package-root-arch
      ARCH_TARBALL: shatv-arch-x86_64-asr.tar.zst
      SHA256SUMS_FILE: SHA256SUMS
      SHERPA_ONNX_VERSION: v1.13.1
      SHERPA_ONNX_PACKAGE: sherpa-onnx-v1.13.1-linux-x64-shared-no-tts
      SHERPA_ONNX_URL: https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.1/sherpa-onnx-v1.13.1-linux-x64-shared-no-tts.tar.bz2

    steps:
      - uses: actions/checkout@v6

      - name: Build Arch ASR release asset
        shell: bash
        run: |
          set -euo pipefail

          docker run --rm -i \
            -e ARCH_BUILD_DIR \
            -e ARCH_PACKAGE_ROOT \
            -e ARCH_TARBALL \
            -e GITHUB_REF_NAME \
            -e GITHUB_REPOSITORY \
            -e GITHUB_WORKSPACE=/workspace \
            -e SHA256SUMS_FILE \
            -e SHERPA_ONNX_PACKAGE \
            -e SHERPA_ONNX_URL \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            "$ARCH_CONTAINER_IMAGE" \
            bash -se <<'ARCH_SCRIPT'
          set -euo pipefail

          pacman -Syu --noconfirm --needed \
            base-devel \
            bzip2 \
            ca-certificates \
            cmake \
            curl \
            ffmpeg \
            git \
            libarchive \
            ninja \
            pkgconf \
            qt6-base \
            qt6-declarative \
            qt6-multimedia \
            qt6-shadertools \
            qt6-tools \
            tar \
            zlib \
            zstd

          git config --global --add safe.directory /workspace

          mkdir -p deps/sherpa
          curl -L --fail --retry 5 --retry-delay 5 "$SHERPA_ONNX_URL" -o deps/sherpa/sherpa-onnx.tar.bz2
          tar -xjf deps/sherpa/sherpa-onnx.tar.bz2 -C deps/sherpa

          sdk_root="$PWD/deps/sherpa/$SHERPA_ONNX_PACKAGE"
          test -f "$sdk_root/include/sherpa-onnx/c-api/c-api.h"
          test -f "$sdk_root/lib/libsherpa-onnx-c-api.so"
          test -f "$sdk_root/lib/libonnxruntime.so"

          cmake -S . -B "$ARCH_BUILD_DIR" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DSHATV_DEBIAN_PACKAGE_NAME=shatv-bin \
            -DBUILD_TESTING=OFF \
            -DSHATV_FETCH_TOML11=ON \
            -DSHATV_ENABLE_ASR=ON \
            -DSHATV_REQUIRE_LIBARCHIVE=ON \
            -DSHATV_INSTALL_BUNDLED_ASR_RUNTIME=ON \
            -DSHATV_SHERPA_ONNX_ROOT="$sdk_root" \
            -DSHATV_LINUX_PACKAGE_DISTRIBUTION=arch
          cmake --build "$ARCH_BUILD_DIR" --target shatv --config Release

          rm -rf "$ARCH_PACKAGE_ROOT"
          DESTDIR="$PWD/$ARCH_PACKAGE_ROOT" cmake --install "$ARCH_BUILD_DIR" --config Release
          test -x "$ARCH_PACKAGE_ROOT/usr/bin/shatv"
          test -f "$ARCH_PACKAGE_ROOT/usr/lib/shatv/libsherpa-onnx-c-api.so"
          test -f "$ARCH_PACKAGE_ROOT/usr/lib/shatv/libonnxruntime.so"

          tar --zstd -cf "$GITHUB_WORKSPACE/$ARCH_TARBALL" -C "$ARCH_PACKAGE_ROOT" usr
          sha256sum "$GITHUB_WORKSPACE/$ARCH_TARBALL" | tee "$GITHUB_WORKSPACE/$SHA256SUMS_FILE"

          release_tag="$GITHUB_REF_NAME"
          pkgver="${release_tag#v}"
          pkgver="${pkgver//-/_}"
          asset_sha="$(cut -d " " -f1 "$GITHUB_WORKSPACE/$SHA256SUMS_FILE")"

          aur_dir="$GITHUB_WORKSPACE/shatv-bin-aur"
          rm -rf "$aur_dir"
          mkdir -p "$aur_dir"
          cat > "$aur_dir/PKGBUILD" <<EOF
          # Maintainer: MaxCrazy <alex02newton@gmail.com>

          pkgname=shatv-bin
          pkgver=$pkgver
          pkgrel=1
          _release_tag=$release_tag
          pkgdesc='Qt-based IPTV player with bundled sherpa-onnx speech recognition'
          arch=('x86_64')
          url='https://github.com/MaxCrazy1101/shatv'
          license=('MIT')
          depends=(
            'ffmpeg'
            'gcc-libs'
            'glibc'
            'hicolor-icon-theme'
            'libarchive'
            'qt6-base'
            'qt6-declarative'
            'qt6-multimedia'
            'qt6-shadertools'
            'zlib'
          )
          provides=('shatv' 'shatv-asr')
          conflicts=('shatv' 'shatv-git' 'shatv-asr' 'shatv-asr-bin')
          options=('!strip')
          source=("https://github.com/$GITHUB_REPOSITORY/releases/download/\${_release_tag}/$ARCH_TARBALL")
          sha256sums=('$asset_sha')

          package() {
            cp -a "\$srcdir/usr" "\$pkgdir/"
          }
          EOF

          sed -i 's/^          //' "$aur_dir/PKGBUILD"
          useradd -m builder
          chown -R builder:builder "$aur_dir"
          su builder -c "cd '$aur_dir' && makepkg --printsrcinfo > .SRCINFO"
          ARCH_SCRIPT

      - name: Upload release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="$GITHUB_REF_NAME"
          title="ShaTV ${tag#v}"
          notes="ShaTV $tag release build."
          if ! gh release view "$tag" >/dev/null 2>&1; then
            create_args=(
              release create "$tag"
              --target "$GITHUB_SHA"
              --title "$title"
              --notes "$notes"
            )
            if [[ "$tag" == *-* ]]; then
              create_args+=(--prerelease)
            fi
            gh "${create_args[@]}" || gh release view "$tag" >/dev/null
          fi

          test -f "$ARCH_TARBALL"
          test -f "$SHA256SUMS_FILE"
          gh release upload "$tag" "$ARCH_TARBALL" --clobber
          gh release upload "$tag" "$SHA256SUMS_FILE" --clobber

      - name: Publish shatv-bin to AUR
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${AUR_SSH_PRIVATE_KEY:-}" ]; then
            echo "::error::AUR_SSH_PRIVATE_KEY is required to publish shatv-bin."
            exit 1
          fi

          install -d -m 700 "$HOME/.ssh"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > "$HOME/.ssh/aur"
          chmod 600 "$HOME/.ssh/aur"
          printf '%s\n' "aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN" > "$HOME/.ssh/known_hosts"
          export GIT_SSH_COMMAND="ssh -i $HOME/.ssh/aur -o IdentitiesOnly=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o StrictHostKeyChecking=yes"

          rm -rf aur-shatv-bin
          if ! git clone ssh://aur@aur.archlinux.org/shatv-bin.git aur-shatv-bin; then
            mkdir aur-shatv-bin
            git -C aur-shatv-bin init
            git -C aur-shatv-bin remote add origin ssh://aur@aur.archlinux.org/shatv-bin.git
          fi

          cp shatv-bin-aur/PKGBUILD aur-shatv-bin/PKGBUILD
          cp shatv-bin-aur/.SRCINFO aur-shatv-bin/.SRCINFO
          git -C aur-shatv-bin config user.name "MaxCrazy1101"
          git -C aur-shatv-bin config user.email "alex02newton@gmail.com"
          git -C aur-shatv-bin add PKGBUILD .SRCINFO

          if git -C aur-shatv-bin diff --cached --quiet; then
            echo "shatv-bin AUR metadata is already up to date."
            exit 0
          fi

          git -C aur-shatv-bin commit -m "Update shatv-bin to $GITHUB_REF_NAME"
          git -C aur-shatv-bin push origin master
