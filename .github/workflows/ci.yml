name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-2022
    permissions:
      contents: write

    env:
      BUILD_DIR: build-windows
      ASR_BUILD_DIR: build-windows-asr
      PACKAGE_ROOT: package-root
      PACKAGE_DIR: package-root/shatv-windows-x64
      PACKAGE_ARCHIVE: shatv-windows-x64.zip
      ASR_PACKAGE_ROOT: package-root-asr
      ASR_PACKAGE_DIR: package-root-asr/shatv-windows-x64-asr
      ASR_PACKAGE_ARCHIVE: shatv-windows-x64-asr.zip
      # aqt does not currently install Qt 6.11.x for Windows.
      QT_VERSION: 6.10.3
      # BtbN provides pre-built FFmpeg shared builds (GPL variant) for Windows.
      FFMPEG_VERSION: master-latest
      FFMPEG_URL: https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl-shared.zip
      SHERPA_ONNX_VERSION: v1.13.1
      SHERPA_ONNX_PACKAGE: sherpa-onnx-v1.13.1-win-x64-shared-MD-Release-no-tts
      SHERPA_ONNX_URL: https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.1/sherpa-onnx-v1.13.1-win-x64-shared-MD-Release-no-tts.tar.bz2

    steps:
      - uses: actions/checkout@v6

      - name: Set up MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_msvc2022_64
          modules: qtmultimedia qtshadertools
          cache: true

      - name: Download FFmpeg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path deps | Out-Null
          Invoke-WebRequest $env:FFMPEG_URL -OutFile deps/ffmpeg.zip
          Expand-Archive -Path deps/ffmpeg.zip -DestinationPath deps/ffmpeg -Force
          # BtbN zip structure: ffmpeg-master-latest-win64-gpl-shared/*. Move contents up one level.
          $inner = Get-ChildItem -Path deps/ffmpeg -Directory | Select-Object -First 1
          if ($inner) {
            Get-ChildItem -Path $inner.FullName -Recurse | Move-Item -Destination deps/ffmpeg -Force
            Remove-Item $inner.FullName -Recurse -Force
          }

      - name: Configure
        shell: pwsh
        run: |
          cmake -S . -B $env:BUILD_DIR -G Ninja -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
            -DBUILD_TESTING=OFF `
            -DSHATV_FFMPEG_INCLUDE_DIR="$PWD/deps/ffmpeg/include" `
            -DSHATV_FFMPEG_LIBRARY_DIR="$PWD/deps/ffmpeg/lib"

      - name: Build
        shell: pwsh
        run: cmake --build $env:BUILD_DIR --target shatv --config Release

      - name: Prepare package root
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:PACKAGE_DIR | Out-Null
          Copy-Item "$env:BUILD_DIR/src/shatv.exe" "$env:PACKAGE_DIR/"
          # Copy FFmpeg shared DLLs
          Copy-Item "$PWD/deps/ffmpeg/bin/*.dll" "$env:PACKAGE_DIR/"

      - name: Deploy Qt runtime
        shell: pwsh
        run: windeployqt.exe --release --qmldir "$PWD/src/ui/qml" "$env:PACKAGE_DIR/shatv.exe"

      - name: Generate license files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:PACKAGE_DIR/licenses" | Out-Null
          Copy-Item "packaging/licenses/MIT.txt" "$env:PACKAGE_DIR/licenses/MIT.txt"
          Copy-Item "packaging/licenses/Apache-2.0.txt" "$env:PACKAGE_DIR/licenses/Apache-2.0.txt"
          Copy-Item "packaging/licenses/LGPL-3.0.txt" "$env:PACKAGE_DIR/licenses/LGPL-3.0.txt"
          Copy-Item "packaging/licenses/LGPL-2.1.txt" "$env:PACKAGE_DIR/licenses/LGPL-2.1.txt"

          $notice = (Get-Content packaging/windows/NOTICE.txt.in -Raw)
          $notice = $notice.Replace("@QT_VERSION@", $env:QT_VERSION).Replace("@FFMPEG_VERSION@", $env:FFMPEG_VERSION)
          Set-Content "$env:PACKAGE_DIR/NOTICE.txt" $notice

          $sources = (Get-Content packaging/windows/THIRD_PARTY_SOURCES.md.in -Raw)
          $sources = $sources.Replace("@QT_VERSION@", $env:QT_VERSION).Replace("@FFMPEG_VERSION@", $env:FFMPEG_VERSION).Replace("@FFMPEG_URL@", $env:FFMPEG_URL)
          Set-Content "$env:PACKAGE_DIR/THIRD_PARTY_SOURCES.md" $sources

      - name: Archive Windows package
        shell: pwsh
        run: |
          Push-Location $env:PACKAGE_ROOT
          Compress-Archive -Path shatv-windows-x64 -DestinationPath "$env:GITHUB_WORKSPACE/$env:PACKAGE_ARCHIVE" -Force
          Pop-Location

      - name: Install ASR Windows dependencies
        shell: pwsh
        run: |
          $vcpkgRoot = "C:\vcpkg"
          $env:VCPKG_ROOT = $vcpkgRoot
          $vcpkgExe = Join-Path $vcpkgRoot "vcpkg.exe"
          if (-not (Test-Path $vcpkgExe)) {
            throw "vcpkg.exe not found: $vcpkgExe"
          }

          & $vcpkgExe install "libarchive[core,bzip2]:x64-windows" --clean-after-build --vcpkg-root "$vcpkgRoot"

      - name: Download sherpa-onnx runtime
        shell: pwsh
        timeout-minutes: 10
        run: |
          New-Item -ItemType Directory -Force -Path deps/sherpa | Out-Null
          $archive = "deps/sherpa/sherpa-onnx.tar.bz2"

          $downloadTimer = [System.Diagnostics.Stopwatch]::StartNew()
          curl.exe -L --fail --retry 5 --retry-delay 5 --connect-timeout 30 --max-time 300 --output $archive $env:SHERPA_ONNX_URL
          $downloadTimer.Stop()
          $downloadedArchive = Get-Item $archive
          Write-Host "Downloaded sherpa-onnx archive bytes=$($downloadedArchive.Length) seconds=$($downloadTimer.Elapsed.TotalSeconds)"

          $sevenZip = (Get-Command 7z.exe -ErrorAction SilentlyContinue).Source
          if (-not $sevenZip) {
            $sevenZip = (Get-Command 7z -ErrorAction SilentlyContinue).Source
          }
          if (-not $sevenZip) {
            throw "7-Zip executable is required to extract $archive"
          }

          $extractTimer = [System.Diagnostics.Stopwatch]::StartNew()
          & $sevenZip x $archive "-odeps/sherpa" -y
          $tarArchive = "deps/sherpa/sherpa-onnx.tar"
          if (-not (Test-Path $tarArchive)) {
            throw "Expected intermediate tar archive missing: $tarArchive"
          }
          & $sevenZip x $tarArchive "-odeps/sherpa" -y
          $extractTimer.Stop()
          Write-Host "Extracted sherpa-onnx runtime seconds=$($extractTimer.Elapsed.TotalSeconds)"
          Remove-Item $archive -Force
          Remove-Item $tarArchive -Force

          $sdkRoot = "$PWD/deps/sherpa/$env:SHERPA_ONNX_PACKAGE"
          if (-not (Test-Path "$sdkRoot/include/sherpa-onnx/c-api/c-api.h")) {
            throw "sherpa-onnx C API header is missing under $sdkRoot"
          }
          if (-not (Test-Path "$sdkRoot/lib/sherpa-onnx-c-api.lib")) {
            throw "sherpa-onnx C API import library is missing under $sdkRoot"
          }
          if (-not (Test-Path "$sdkRoot/lib/onnxruntime.lib")) {
            throw "ONNX Runtime import library is missing under $sdkRoot"
          }

      - name: Configure ASR build
        shell: pwsh
        run: |
          $vcpkgRoot = "C:\vcpkg"
          $env:VCPKG_ROOT = $vcpkgRoot

          cmake -S . -B $env:ASR_BUILD_DIR -G Ninja -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$vcpkgRoot/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_PREFIX_PATH="$env:QT_ROOT_DIR" `
            -DBUILD_TESTING=OFF `
            -DSHATV_ENABLE_ASR=ON `
            -DSHATV_REQUIRE_LIBARCHIVE=ON `
            -DSHATV_SHERPA_ONNX_ROOT="$PWD/deps/sherpa/$env:SHERPA_ONNX_PACKAGE" `
            -DSHATV_FFMPEG_INCLUDE_DIR="$PWD/deps/ffmpeg/include" `
            -DSHATV_FFMPEG_LIBRARY_DIR="$PWD/deps/ffmpeg/lib"

      - name: Build ASR package binary
        shell: pwsh
        run: cmake --build $env:ASR_BUILD_DIR --target shatv --config Release

      - name: Prepare ASR package root
        shell: pwsh
        run: |
          $vcpkgRoot = "C:\vcpkg"
          $env:VCPKG_ROOT = $vcpkgRoot

          New-Item -ItemType Directory -Force -Path $env:ASR_PACKAGE_DIR | Out-Null
          Copy-Item "$env:ASR_BUILD_DIR/src/shatv.exe" "$env:ASR_PACKAGE_DIR/"
          Copy-Item "$PWD/deps/ffmpeg/bin/*.dll" "$env:ASR_PACKAGE_DIR/"
          Copy-Item "$PWD/deps/sherpa/$env:SHERPA_ONNX_PACKAGE/lib/*.dll" "$env:ASR_PACKAGE_DIR/"
          Copy-Item "$vcpkgRoot/installed/x64-windows/bin/*.dll" "$env:ASR_PACKAGE_DIR/"

      - name: Deploy ASR Qt runtime
        shell: pwsh
        run: windeployqt.exe --release --qmldir "$PWD/src/ui/qml" "$env:ASR_PACKAGE_DIR/shatv.exe"

      - name: Generate ASR license files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:ASR_PACKAGE_DIR/licenses" | Out-Null
          Copy-Item "packaging/licenses/MIT.txt" "$env:ASR_PACKAGE_DIR/licenses/MIT.txt"
          Copy-Item "packaging/licenses/Apache-2.0.txt" "$env:ASR_PACKAGE_DIR/licenses/Apache-2.0.txt"
          Copy-Item "packaging/licenses/LGPL-3.0.txt" "$env:ASR_PACKAGE_DIR/licenses/LGPL-3.0.txt"
          Copy-Item "packaging/licenses/LGPL-2.1.txt" "$env:ASR_PACKAGE_DIR/licenses/LGPL-2.1.txt"

          $notice = (Get-Content packaging/windows/NOTICE.txt.in -Raw)
          $notice = $notice.Replace("@QT_VERSION@", $env:QT_VERSION).Replace("@FFMPEG_VERSION@", $env:FFMPEG_VERSION)
          $notice += "`r`nASR package additions:`r`n"
          $notice += "- sherpa-onnx $env:SHERPA_ONNX_VERSION`r`n"
          $notice += "- ONNX Runtime bundled with sherpa-onnx $env:SHERPA_ONNX_VERSION`r`n"
          $notice += "- libarchive from vcpkg x64-windows`r`n"
          Set-Content "$env:ASR_PACKAGE_DIR/NOTICE.txt" $notice

          $sources = (Get-Content packaging/windows/THIRD_PARTY_SOURCES.md.in -Raw)
          $sources = $sources.Replace("@QT_VERSION@", $env:QT_VERSION).Replace("@FFMPEG_VERSION@", $env:FFMPEG_VERSION).Replace("@FFMPEG_URL@", $env:FFMPEG_URL)
          $sources += @"

          ## sherpa-onnx
          - Version: $env:SHERPA_ONNX_VERSION
          - License: Apache-2.0
          - Binary source: $env:SHERPA_ONNX_URL
          - Upstream source: https://github.com/k2-fsa/sherpa-onnx

          ## ONNX Runtime
          - License: MIT
          - Bundled with the selected sherpa-onnx binary package.
          - Upstream source: https://github.com/microsoft/onnxruntime

          ## libarchive
          - License: BSD-style
          - Package: libarchive:x64-windows from vcpkg
          - Upstream source: https://github.com/libarchive/libarchive
          "@
          Set-Content "$env:ASR_PACKAGE_DIR/THIRD_PARTY_SOURCES.md" $sources

      - name: Archive ASR Windows package
        shell: pwsh
        run: |
          Push-Location $env:ASR_PACKAGE_ROOT
          Compress-Archive -Path shatv-windows-x64-asr -DestinationPath "$env:GITHUB_WORKSPACE/$env:ASR_PACKAGE_ARCHIVE" -Force
          Pop-Location

      - name: Upload pull request artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: shatv-windows-packages
          path: |
            ${{ env.PACKAGE_ARCHIVE }}
            ${{ env.ASR_PACKAGE_ARCHIVE }}
          if-no-files-found: error
          retention-days: 1

      - name: Publish alpha release asset
        if: github.event_name != 'pull_request'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "alpha"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --target "$env:GITHUB_SHA" `
              --title "Alpha" `
              --notes "Continuously updated ShaTV alpha build." `
              --prerelease
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

          gh release upload $tag "$env:GITHUB_WORKSPACE/$env:PACKAGE_ARCHIVE" --clobber
          gh release upload $tag "$env:GITHUB_WORKSPACE/$env:ASR_PACKAGE_ARCHIVE" --clobber

  build-linux-deb:
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    env:
      BUILD_DIR: build-linux
      ASR_BUILD_DIR: build-linux-asr
      LINUX_CONTAINER_IMAGE: ubuntu:26.04
      LINUX_DEB: shatv-ubuntu-26.04-amd64.deb
      LINUX_ASR_DEB: shatv-ubuntu-26.04-amd64-asr.deb
      SHERPA_ONNX_VERSION: v1.13.1
      SHERPA_ONNX_PACKAGE: sherpa-onnx-v1.13.1-linux-x64-shared-no-tts
      SHERPA_ONNX_URL: https://github.com/k2-fsa/sherpa-onnx/releases/download/v1.13.1/sherpa-onnx-v1.13.1-linux-x64-shared-no-tts.tar.bz2

    steps:
      - uses: actions/checkout@v6

      - name: Build Linux packages in Ubuntu 26.04
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm \
            -e ASR_BUILD_DIR \
            -e BUILD_DIR \
            -e LINUX_ASR_DEB \
            -e LINUX_DEB \
            -e SHERPA_ONNX_PACKAGE \
            -e SHERPA_ONNX_URL \
            -e GITHUB_WORKSPACE=/workspace \
            -v "$GITHUB_WORKSPACE:/workspace" \
            -w /workspace \
            "$LINUX_CONTAINER_IMAGE" \
            bash -lc '
              set -euo pipefail
              export DEBIAN_FRONTEND=noninteractive

              apt-get update
              apt-get install -y --no-install-recommends \
                build-essential \
                bzip2 \
                ca-certificates \
                cmake \
                curl \
                dpkg-dev \
                file \
                git \
                libarchive-dev \
                libavcodec-dev \
                libavformat-dev \
                libavutil-dev \
                libgl1-mesa-dev \
                libswresample-dev \
                libswscale-dev \
                libvulkan-dev \
                libxkbcommon-dev \
                ninja-build \
                pkg-config \
                qt6-base-dev \
                qt6-base-private-dev \
                qt6-declarative-dev \
                qt6-multimedia-dev \
                qt6-shadertools-dev \
                qt6-tools-dev \
                qt6-tools-dev-tools \
                zlib1g-dev

              git config --global --add safe.directory /workspace

              cmake -S . -B "$BUILD_DIR" -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr \
                -DBUILD_TESTING=OFF \
                -DSHATV_FETCH_TOML11=ON \
                -DSHATV_LINUX_PACKAGE_DISTRIBUTION=ubuntu-26.04
              cmake --build "$BUILD_DIR" --target package --config Release
              cp "$BUILD_DIR/$LINUX_DEB" "$GITHUB_WORKSPACE/$LINUX_DEB"

              mkdir -p deps/sherpa
              curl -L "$SHERPA_ONNX_URL" -o deps/sherpa/sherpa-onnx.tar.bz2
              tar -xjf deps/sherpa/sherpa-onnx.tar.bz2 -C deps/sherpa

              sdk_root="$PWD/deps/sherpa/$SHERPA_ONNX_PACKAGE"
              test -f "$sdk_root/include/sherpa-onnx/c-api/c-api.h"
              test -f "$sdk_root/lib/libsherpa-onnx-c-api.so"
              test -f "$sdk_root/lib/libonnxruntime.so"

              cmake -S . -B "$ASR_BUILD_DIR" -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_INSTALL_PREFIX=/usr \
                -DBUILD_TESTING=OFF \
                -DSHATV_FETCH_TOML11=ON \
                -DSHATV_ENABLE_ASR=ON \
                -DSHATV_REQUIRE_LIBARCHIVE=ON \
                -DSHATV_INSTALL_BUNDLED_ASR_RUNTIME=ON \
                -DSHATV_SHERPA_ONNX_ROOT="$PWD/deps/sherpa/$SHERPA_ONNX_PACKAGE" \
                -DSHATV_LINUX_PACKAGE_DISTRIBUTION=ubuntu-26.04
              cmake --build "$ASR_BUILD_DIR" --target package --config Release
              cp "$ASR_BUILD_DIR/$LINUX_ASR_DEB" "$GITHUB_WORKSPACE/$LINUX_ASR_DEB"
            '

      - name: Upload pull request Linux artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: shatv-linux-deb-packages
          path: |
            ${{ env.LINUX_DEB }}
            ${{ env.LINUX_ASR_DEB }}
          if-no-files-found: error
          retention-days: 1

      - name: Publish Linux alpha release assets
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="alpha"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" \
              --target "$GITHUB_SHA" \
              --title "Alpha" \
              --notes "Continuously updated ShaTV alpha build." \
              --prerelease || gh release view "$tag" >/dev/null
          fi

          gh release upload "$tag" "$GITHUB_WORKSPACE/$LINUX_DEB" --clobber
          gh release upload "$tag" "$GITHUB_WORKSPACE/$LINUX_ASR_DEB" --clobber
